<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>GeoAR.js demo</title>
    <script src='https://aframe.io/releases/0.9.2/aframe.min.js'></script>
    <script src="https://raw.githack.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script>
        THREEx.ArToolkitContext.baseURL = 'https://raw.githack.com/jeromeetienne/ar.js/master/three.js/'
    </script>
</head>

<body style='margin: 0; overflow: hidden;'>
    <a-scene
        vr-mode-ui="enabled: false"
		embedded
        arjs='sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;'>
        
        <a-camera gps-camera rotation-reader></a-camera>
<a-entity gltf-model="./assets/assets.gltf" rotation="0 180 0" scale="0.15 0.15 0.15" gps-entity-place="longitude: 49.833264; latitude: 7.876055;" animation-mixer/>
<a-entity gltf-model="./assets/assets.jpg" rotation="0 180 0" scale="0.15 0.15 0.15" gps-entity-place="latitude: 49.84203530940302; longitude: 7.873036622968358;" animation-mixer/>            
<a-image="./assets/assets.jpg" rotation="0 180 0" scale="0.15 0.15 0.15" gps-entity-place="latitude: 49.84223595991808; longitude: 7.873331665959996;" ><a-image/>
<a-entity gltf-model="./assets/magnemite/assets.gltf" rotation="0 180 0" scale="0.15 0.15 0.15" gps-entity-place="latitude: 49.842141400573404; longitude: 7.873428225484532;" animation-mixer/>
<a-image src="./assets/assets.jpg" rotation="0 180 0" scale="0.15 0.15 0.15" gps-entity-place="latitude: 49.84219790558406; longitude: 7.87298834320609;" ><a-image/>
<a-image src="./assets/assets.jpg" rotation="0 180 0" scale="0.15 0.15 0.15" gps-entity-place="latitude: 49.841970732048026; longitude: 7.872441172567052;" ><a-image/>
</a-scene>
</body>
</html>
