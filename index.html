<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script scr="ar-components.js"></script>
  </head>
  <body>
     <body>
    <a-scene embedded arjs xr-mode-ui="enterVRButton: #myButton">>
        <button id="myButton" style="position: absolute; bottom: 20px; left: 20px;">
    VR Starten
  </button>
    <a-entity id="world" scale="0.1 0.1 0.1">
      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#FFC65D"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-plane position="0 -10 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-camera
         position="0 1 4"
         cursor-visible="true"
         cursor-scale="2"
         cursor-color="#0095DD"
         cursor-opacity="0.5">
      </a-camera>
    </a-entity>
    
 </a-scene>
  </body>
</html>
<a-scene xr-mode-ui="enterVRButton: #myButton">
  <button id="myButton" style="position: absolute; bottom: 20px; left: 20px;">
    VR Starten
  </button>

</a-scene>
