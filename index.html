<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Foto an Position</title>
    <!-- A-Frame Bibliothek laden -->
    <script src="https://aframe.io"></script>
  </head>
  <body>
    <a-scene>
      <!-- Assets laden (für schnellere Darstellung) -->
      <a-assets>
        <img id="meinFoto" src="assets\assets.jpg"> <!-- HIER BILD PFAD ANPASSEN -->
      </a-assets>
      <!-- Hintergrund (Himmel) -->
      <a-sky color="#ECECEC"></a-sky>
      <!-- FOTO AN EINEM BESTIMMTEN ORT -->
      <!-- position: x y z (0 0 0 ist die Mitte des Raumes) -->
      <!-- rotation: x y z in Grad -->
      <a-image
        src="#meinFoto"
        position="0 1.5 -3"
        width="4"
        height="3">
      </a-image>

     <!-- Kamera, damit man sich umsehen kann -->
      <a-camera>
        <a-cursor></a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>
